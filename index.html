<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <title>Sign-up Form</title>
    </head>
    <body>
        <div id="sidebar-div">
            <div id="logo-div">
                <h1><img src="odin-lined.png" alt="The Odin Project logo">ODIN</h1>
                <p>Photo by <a href="https://unsplash.com/photos/snowy-alleyway-with-a-skybridge-between-buildings-LqpoNefeC4k">Maëva Vigier</a> on <a href="https://unsplash.com/">Unsplash</a></p>
            </div>
        </div>
        <main>
            <div id="main-div">
                <p class="bold-text">
                    This is not a real online service! You know you need something 
                    like this in your life to help you realize your deepest dreams. 
                    Sign up <em>now</em> to get started.
                </p>
                <p class="bold-text">You <em>know</em> you want to.</p>

                <form>
                    <div id="form-div">
                        <p class="bold-text">Let's do this!</p>

                        <div class="form-field">
                            <label for="first-name">First Name</label>
                            <input type="text" id="first-name" name="first-name">
                        </div>

                        <div class="form-field">
                            <label for="last-name">Last Name</label>
                            <input type="text" id="last-name" name="last-name">
                        </div>

                        <div class="form-field">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email">
                        </div>

                        <div class="form-field">
                            <label for="phone">Phone Number</label>
                            <input type="number" id="phone" name="phone">
                        </div>

                        <div class="form-field">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password">
                        </div>

                        <div class="form-field">
                            <label for="c-password">Confirm Password</label>
                            <input type="password" id="c-password" name="c-password">
                        </div>
                    </div>

                    <button type="submit" class="submit-btn">Create Account</button>
                </form>

                <p id="footer-text">Already have an account? <span id="login-text">Log In</span></p>
            </div>
        </main>
    </body>
</html>
